name: ci

on:
  pull_request:
  push:
    branches:
      - master
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar dependencias
        run: npm ci
      - name: Sintaxis JavaScript
        run: npm run check
      - name: Pruebas unitarias
        run: npm test
      - name: Archivos estáticos presentes
        run: test -f index.html && test -f styles.css && test -f app.js && test -f palette-core.js

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Empaquetar sitio
        run: mkdir -p _site && cp index.html styles.css palette-core.js app.js _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
